<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
</head>
<body>
    Primeira linha <br> Segunda linha
    <strong>Texto em negrito semântico</strong><br>
    <b>Texto em negrito sem semântica</b><br>

    <em>Texto em itálico semântico</em><br>
    <i>Texto em itálico sem semântica</i><br>

    <del>Texto tachado semântico</del><br>
    <s>Texto tachado sem semântica</s><br>

    <u>Texto sublinhado</u><br>
    X<sub>2</sub><br>
    H<sup>2</sup>0<br>
    <code>console.log('Olá, mundo!')</code><br>
    <blockquote>Citação em bloco</blockquote><br>
    <q>Citação curta</q><br>
</body>
</html>
